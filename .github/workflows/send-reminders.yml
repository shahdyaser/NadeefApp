name: Send Nadeef Reminders

on:
  schedule:
    # Every hour on minute 0 UTC.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminders endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_BASE_URL or CRON_SECRET GitHub secret."
            exit 1
          fi

          ENDPOINT="${APP_BASE_URL%/}/api/notifications/reminders"
          echo "Calling $ENDPOINT"

          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$ENDPOINT"
